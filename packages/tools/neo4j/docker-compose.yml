services:
  neo4j:
    image: neo4j:5-community
    container_name: fastgpt-plugin-neo4j-test
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/fastgpt-test-password
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 512m
      NEO4J_dbms_security_auth__enabled: "true"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -a bolt://localhost:7687 -u neo4j -p fastgpt-test-password 'RETURN 1' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

volumes:
  neo4j_data:
  neo4j_logs:
