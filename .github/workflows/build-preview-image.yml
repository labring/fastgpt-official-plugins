name: Build Preview Image

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pull-requests: read

concurrency:
  group: build-preview-image-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY || 'ghcr.io' }}
  BUILD_SERVER_IMAGE: ${{ vars.BUILD_SERVER_IMAGE || format('{0}/build-server', github.repository) }}
  IMAGE_PLATFORMS: ${{ vars.IMAGE_PLATFORMS || 'linux/amd64' }}

jobs:
  build-preview-image:
    name: Build Preview Image
    runs-on: ubuntu-latest
    environment: PreviewBuild

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Dockerfile
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f Dockerfile ]; then
            echo "Dockerfile not found: Dockerfile" >&2
            exit 1
          fi

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          set -euo pipefail

          image="${IMAGE_REGISTRY}/${BUILD_SERVER_IMAGE}"
          echo "image=${image,,}" >> "$GITHUB_OUTPUT"

      - name: Resolve push mode
        id: mode
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "push=false" >> "$GITHUB_OUTPUT"
            echo "Forked PR detected; the preview image was built without pushing to the registry." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "push=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: steps.mode.outputs.push == 'true' && env.IMAGE_REGISTRY == 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to custom container registry
        if: steps.mode.outputs.push == 'true' && env.IMAGE_REGISTRY != 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=raw,value=pr-${{ github.event.pull_request.number || github.run_number }}
            type=sha,prefix=preview-

      - name: Build preview image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ env.IMAGE_PLATFORMS }}
          push: ${{ steps.mode.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
