name: Extract Updated Tools

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
  workflow_dispatch:
    inputs:
      base_sha:
        description: "Base SHA for diff. Defaults to the previous commit."
        required: false
      head_sha:
        description: "Head SHA for diff. Defaults to the current commit."
        required: false

permissions:
  contents: read
  actions: write

concurrency:
  group: extract-updated-tools-${{ github.ref }}
  cancel-in-progress: false

jobs:
  extract-updated-tools:
    name: Extract Updated Tools
    runs-on: ubuntu-latest

    outputs:
      has_changes: ${{ steps.extract.outputs.has_changes }}
      tools: ${{ steps.extract.outputs.tools }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve diff range
        id: range
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            base_sha="${{ inputs.base_sha }}"
            head_sha="${{ inputs.head_sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          if [ -z "$head_sha" ]; then
            head_sha="$(git rev-parse HEAD)"
          fi

          if [ -z "$base_sha" ] || [[ "$base_sha" =~ ^0+$ ]]; then
            base_sha="$(git rev-list --max-parents=0 "$head_sha")"
          fi

          echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"

      - name: Extract updated tools
        id: extract
        run: node scripts/extract-updated-tools.mjs "${{ steps.range.outputs.base_sha }}" "${{ steps.range.outputs.head_sha }}"

      - name: Upload extraction artifact
        if: steps.extract.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: updated-tools
          path: updated-tools.json
          if-no-files-found: error

      - name: Trigger marketplace publish approval
        if: steps.extract.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        env:
          UPDATED_TOOLS: ${{ steps.extract.outputs.tools }}
          SOURCE_SHA: ${{ steps.range.outputs.head_sha }}
          SOURCE_RUN_ID: ${{ github.run_id }}
        with:
          script: |
            const ref = context.ref.startsWith("refs/heads/")
              ? context.ref.replace("refs/heads/", "")
              : context.sha;

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "publish-tools-to-marketplace.yml",
              ref,
              inputs: {
                tools: process.env.UPDATED_TOOLS,
                source_sha: process.env.SOURCE_SHA,
                source_run_id: process.env.SOURCE_RUN_ID,
              },
            });
